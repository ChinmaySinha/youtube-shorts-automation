# GitHub Actions workflow for automated YouTube Shorts posting
# Runs up to 7 times daily — the gate script decides whether to actually post or skip

name: Post YouTube Short

on:
  schedule:
    # 7 slots spread across the day (UTC times)
    - cron: '30 3 * * *'    # 09:00 IST
    - cron: '30 5 * * *'    # 11:00 IST
    - cron: '30 8 * * *'    # 14:00 IST
    - cron: '0 11 * * *'    # 16:30 IST
    - cron: '30 12 * * *'   # 18:00 IST
    - cron: '30 14 * * *'   # 20:00 IST
    - cron: '30 16 * * *'   # 22:00 IST

  workflow_dispatch:

jobs:
  post-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg and ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore credentials
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS_B64 }}
          DOTENV_FILE: ${{ secrets.DOTENV_B64 }}
        run: |
          echo "$YOUTUBE_TOKEN" | base64 -d > youtube_agent_system/token.pickle
          echo "$CLIENT_SECRETS" | base64 -d > youtube_agent_system/client_secrets.json
          echo "$DOTENV_FILE" | base64 -d > youtube_agent_system/.env

      - name: Setup directories
        run: |
          mkdir -p youtube_agent_system/generated_assets
          mkdir -p youtube_agent_system/logs
          mkdir -p youtube_agent_system/fonts
          mkdir -p youtube_agent_system/chroma_db

      # DEBUG: verify we have the right code and files
      - name: Debug - verify code and files
        run: |
          echo "=== Commit SHA ==="
          git log --oneline -1
          echo "=== Line 18 of intelligence_agent.py ==="
          sed -n '18p' youtube_agent_system/intelligence_agent.py
          echo "=== Background video files ==="
          ls -la youtube_agent_system/*.mp4 2>/dev/null || echo "NO MP4 FILES FOUND"
          echo "=== Python version ==="
          python --version

      - name: Restore scheduler state
        uses: actions/cache@v4
        with:
          path: youtube_agent_system/logs/ga_scheduler_state.json
          key: scheduler-state-${{ github.run_number }}
          restore-keys: |
            scheduler-state-

      - name: Check if we should post
        id: gate
        run: |
          if python -m youtube_agent_system.post_gate; then
            echo "decision=post" >> $GITHUB_OUTPUT
          else
            echo "decision=skip" >> $GITHUB_OUTPUT
            echo "Gate says SKIP — already hit daily target"
          fi

      - name: Cache ChromaDB
        if: steps.gate.outputs.decision == 'post'
        uses: actions/cache@v4
        with:
          path: youtube_agent_system/chroma_db
          key: chromadb-stories-v1
          restore-keys: |
            chromadb-stories-

      - name: Load training stories
        if: steps.gate.outputs.decision == 'post'
        run: |
          python -c "
          from youtube_agent_system import knowledge_base
          count = knowledge_base.get_training_story_count()
          print(f'Training stories in ChromaDB: {count}')
          if count < 100:
              print('ChromaDB is empty, running training pipeline...')
              from youtube_agent_system.train_story_model import run_training_pipeline
              run_training_pipeline(max_download=3000, top_n=2000, min_quality=3.0)
          else:
              print('ChromaDB has enough stories, skipping download')
          "

      - name: Run video production pipeline
        if: steps.gate.outputs.decision == 'post'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== Starting YouTube Shorts Pipeline ==="
          echo "Time: $(date)"
          python -m youtube_agent_system.main quick 2>&1 | tail -100
          echo "=== Pipeline Complete ==="

      - name: Record success
        if: steps.gate.outputs.decision == 'post' && success()
        run: python -m youtube_agent_system.post_gate success

      - name: Record failure
        if: steps.gate.outputs.decision == 'post' && failure()
        run: python -m youtube_agent_system.post_gate failure

      - name: Save scheduler state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: youtube_agent_system/logs/ga_scheduler_state.json
          key: scheduler-state-${{ github.run_number }}

      - name: Cleanup large files
        if: always()
        run: |
          rm -f youtube_agent_system/generated_assets/*.mp4
          rm -f youtube_agent_system/generated_assets/*.mp3
          rm -f youtube_agent_system/generated_assets/*.wav

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: youtube_agent_system/logs/
          retention-days: 7
